version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8
  pre_build:
    commands:
      - echo "Checking connection to the S3 Dependency Warehouse..."
      - aws s3 ls s3://vladan-dependency-repo
  build:
    commands:
      - echo "Assembling the product..."
      - mvn -s settings.xml compile
  post_build:
    commands:
      - echo "Packaging the final product..."
      - mvn -s settings.xml package
artifacts:
  files:
    - target/nextwork-web-project.war
  discard-paths: yes